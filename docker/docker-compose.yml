version: "3.9"

services:
  dashr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dashr
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database outside the container
      - dashr-data:/app/data
      # Mount your OpenClaw config so DashR can read it
      - ${HOME}/.openclaw:/root/.openclaw:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/dashboard.db
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-wss://host.docker.internal:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-change-me-in-production}
    # Allow DashR to reach OpenClaw gateway on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dashr-data:
    name: dashr-data
